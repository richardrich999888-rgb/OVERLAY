stages:
  - lint
  - build
  - integration_test
  - package

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TERM_COLOR: "always"
  RUST_BACKTRACE: "1"
  SYNTRIASS_SO: "target/release/libsyntriass_overlay.so"

default:
  image: rust:1.85-slim-bookworm
  before_script:
    - apt-get update -yq
    - apt-get install -yq python3 build-essential binutils coreutils >/dev/null

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/
    - target/

lint:core:
  stage: lint
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --check
    - cargo clippy -- -D warnings

build:release:
  stage: build
  script:
    - cargo build --release --locked
    - test -f "$SYNTRIASS_SO"
    - |
      for sym in connect sendfile64 splice; do
        if nm -D "$SYNTRIASS_SO" | grep -Eq " T ${sym}$"; then
          echo "public T symbol verified: ${sym}"
        else
          echo "missing public T interposition symbol: ${sym}" >&2
          exit 1
        fi
      done
    - mkdir -p dist
    - sha256sum "$SYNTRIASS_SO" | tee dist/SHA256SUMS
  artifacts:
    name: "syntriass-core-$CI_COMMIT_SHA"
    paths:
      - target/release/libsyntriass_overlay.so
      - dist/SHA256SUMS
    expire_in: 1 week

test:integration:
  stage: integration_test
  needs:
    - job: build:release
      artifacts: true
  script:
    - |
      bash -c '
        set -euo pipefail
        cargo test --release --locked
        python3 tests/verify_wire.py
        SYNTRIASS_SUITE=0x02 python3 tests/verify_wire.py
        python3 tests/failclosed_test.py
        python3 tests/concurrency_test.py
        python3 tests/fork_test.py | tee /tmp/syntriass-fork-test.log
        grep -F "CHILD_INHERITED_FAIL errno=32" /tmp/syntriass-fork-test.log
        python3 tests/egress_test.py | tee /tmp/syntriass-egress-test.log
        grep -F "SENDFILE64_STREAM_FAIL errno=95" /tmp/syntriass-egress-test.log
        grep -F "SPLICE_STREAM_FAIL errno=95" /tmp/syntriass-egress-test.log
        python3 tests/characterize.py
      '

package:debian:
  stage: package
  needs:
    - job: build:release
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  before_script:
    - apt-get update -yq
    - apt-get install -yq ruby ruby-dev rubygems build-essential >/dev/null
    - gem install --no-document fpm
  script:
    - install -Dm0755 "$SYNTRIASS_SO" package-root/usr/lib/syntriass/libsyntriass_overlay.so
    - |
      fpm -s dir -t deb \
        -n syntriass-overlay \
        -v "${CI_COMMIT_TAG#v}" \
        --architecture amd64 \
        --description "Post-quantum-hybrid runtime interposition shared object for Linux/glibc" \
        -C package-root .
  artifacts:
    name: "syntriass-debian-package-$CI_COMMIT_TAG"
    paths:
      - "*.deb"
