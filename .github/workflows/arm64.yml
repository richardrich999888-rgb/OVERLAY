name: ARM64 Native Validation

# Native ARM64 (aarch64) execution on GitHub's ubuntu-24.04-arm runners
# (Cobalt/Neoverse-class CPUs). This is the native half of the ARM64 evidence:
# the emulated half (QEMU user-mode, run anywhere) is documented in
# docs/ARM64_VALIDATION.md. Numbers printed by the benchmark steps are NATIVE
# ARM64 measurements — collect them from the job log into
# docs/ARM64_BENCHMARKS.md.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  arm64-native:
    name: Build, test & benchmark natively on ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Confirm native aarch64
        run: |
          set -euo pipefail
          uname -m | grep -q aarch64
          lscpu | head -20

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build (release, locked)
        run: cargo build --release --locked

      - name: Full test suite (native ARM64)
        run: cargo test --release --locked

      - name: Benchmarks (native ARM64 — collect into docs/ARM64_BENCHMARKS.md)
        run: |
          set -euo pipefail
          cargo bench --locked --bench oob_benchmarks
          cargo bench --locked --bench identity_benchmarks
          cargo bench --locked --bench demo_benchmarks

      - name: eBPF policy engine build (BPF target, arm64 arch define)
        run: |
          set -euo pipefail
          sudo apt-get update -yq
          sudo apt-get install -yq clang llvm libbpf-dev libelf-dev zlib1g-dev gcc
          ARCH_INC="$(dirname "$(find /usr/include -name types.h -path '*asm/types.h' | head -1)")"
          ARCH_INC="${ARCH_INC%/asm}"
          cd ebpf/c
          for f in connect4 policy policy_v2; do
            clang -O2 -g -Wall -target bpf -D__TARGET_ARCH_arm64 \
              ${ARCH_INC:+-idirafter "$ARCH_INC"} -c "$f.bpf.c" -o "$f.bpf.o"
          done
          clang -O2 -Wall policy_v2_loader.c -o policy_v2_loader -lbpf -lelf -lz
          echo "BPF objects + loader built for arm64"

      - name: eBPF kernel validation (ARM64 kernel, real connects)
        # cgroup2 + CGROUP_SOCK_ADDR are available on the ARM64 runner kernel;
        # these are the same measured validators run on x86_64 (sudo for
        # CAP_BPF/CAP_SYS_ADMIN). Tolerated as best-effort if the runner image
        # restricts BPF: the step reports rather than hides a restriction.
        run: |
          set -euo pipefail
          sudo bash scripts/ebpf_policy_v2_validate.sh || echo "::warning::policy v2 validator blocked on this runner"
          sudo bash scripts/ebpf_policy_hier_validate.sh || echo "::warning::hier validator blocked on this runner"
          sudo bash scripts/ebpf_quarantine_validate.sh || echo "::warning::quarantine validator blocked on this runner"
          sudo bash scripts/ebpf_profile_validate.sh || echo "::warning::profile validator blocked on this runner"
