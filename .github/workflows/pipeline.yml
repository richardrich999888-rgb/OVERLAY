name: Syntriass Overlay Production Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  SYNTRIASS_SO: target/release/libsyntriass_overlay.so

jobs:
  build-and-verify:
    name: Build and validate fail-closed runtime defenses
    runs-on: ubuntu-24.04
    container:
      image: rust:1.85-slim-bookworm
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Step 1 - Install toolchain components and verification packages
        run: |
          set -euo pipefail
          apt-get update -yq
          apt-get install -yq python3 build-essential binutils coreutils >/dev/null
          rustup component add rustfmt clippy

      - name: Step 2 - Execute formatting and lint gates
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy -- -D warnings

      - name: Step 3 - Compile locked release shared object
        run: |
          set -euo pipefail
          cargo build --release --locked
          test -f "$SYNTRIASS_SO"

      - name: Step 4 - Audit exported interposition symbols
        run: |
          set -euo pipefail
          for sym in connect sendfile64 splice; do
            if nm -D "$SYNTRIASS_SO" | grep -Eq " T ${sym}$"; then
              echo "public T symbol verified: ${sym}"
            else
              echo "missing public T interposition symbol: ${sym}" >&2
              exit 1
            fi
          done

      - name: Step 5 - Execute unit and python-driven integration matrix
        run: |
          set -euo pipefail
          cargo test --release --locked
          python3 tests/verify_wire.py
          SYNTRIASS_SUITE=0x02 python3 tests/verify_wire.py
          python3 tests/failclosed_test.py
          python3 tests/concurrency_test.py
          python3 tests/fork_test.py | tee /tmp/syntriass-fork-test.log
          grep -F "CHILD_INHERITED_FAIL errno=32" /tmp/syntriass-fork-test.log
          python3 tests/egress_test.py | tee /tmp/syntriass-egress-test.log
          grep -F "SENDFILE64_STREAM_FAIL errno=95" /tmp/syntriass-egress-test.log
          grep -F "SPLICE_STREAM_FAIL errno=95" /tmp/syntriass-egress-test.log
          python3 tests/characterize.py

      - name: Step 6 - Generate diagnostic artifact and SHA256 manifest
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "$SYNTRIASS_SO" dist/libsyntriass_overlay.so
          strip --strip-unneeded dist/libsyntriass_overlay.so
          sha256sum dist/libsyntriass_overlay.so | tee dist/SHA256SUMS

      - name: Upload diagnostic evaluation artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsyntriass-overlay-linux-glibc
          path: |
            dist/libsyntriass_overlay.so
            dist/SHA256SUMS
          retention-days: 1
