# ARM64 cross-build + emulated-execution configuration (docs/ARM64_VALIDATION.md).
#
# Build:  cargo build --release --target aarch64-unknown-linux-gnu
# Test:   cargo test  --release --target aarch64-unknown-linux-gnu
#         (tests execute under qemu-aarch64-static user-mode emulation; correctness
#          is real ARM64 ISA execution, timings are emulated — see the doc)
#
# Requires: rustup target add aarch64-unknown-linux-gnu
#           apt-get install gcc-aarch64-linux-gnu qemu-user-static
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
runner = ["qemu-aarch64-static", "-L", "/usr/aarch64-linux-gnu"]
